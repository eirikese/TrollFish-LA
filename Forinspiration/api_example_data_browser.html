<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrollSports Data Browser</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  font-family: system-ui, -apple-system, sans-serif;
  font-size: 14px;
  background: #0f1117;
  color: #e2e8f0;
}

body {
  display: flex;
  flex-direction: column;
}

/* ── header ── */
header {
  flex-shrink: 0;
  background: #1a1d27;
  border-bottom: 1px solid #2d3148;
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
header h1 { font-size: 14px; font-weight: 600; color: #a5b4fc; flex-shrink: 0; }
.cfg { display: flex; align-items: center; gap: 6px; flex: 1; min-width: 200px; }
.cfg label { color: #64748b; font-size: 12px; white-space: nowrap; }
.cfg input {
  flex: 1; min-width: 0;
  background: #0f1117; border: 1px solid #2d3148; border-radius: 5px;
  color: #e2e8f0; padding: 5px 8px; font-size: 12px; font-family: monospace;
}
.cfg input:focus { outline: none; border-color: #6366f1; }

/* ── status banner (below header) ── */
#statusBanner {
  flex-shrink: 0;
  padding: 6px 16px;
  font-size: 12px;
  min-height: 30px;
  display: flex;
  align-items: center;
  gap: 6px;
  background: #161820;
  border-bottom: 1px solid #2d3148;
  color: #64748b;
}
#statusBanner.err  { color: #f87171; background: #1f1010; }
#statusBanner.ok   { color: #4ade80; }

/* ── main layout ── */
.layout {
  flex: 1;
  display: flex;
  overflow: hidden;
}

/* ── sidebar ── */
.sidebar {
  width: 320px;
  flex-shrink: 0;
  border-right: 1px solid #2d3148;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.filters {
  flex-shrink: 0;
  padding: 8px 10px;
  border-bottom: 1px solid #2d3148;
  display: flex;
  flex-direction: column;
  gap: 5px;
}
.filter-row { display: flex; gap: 5px; }
.filter-row input, .filter-row select {
  flex: 1; min-width: 0;
  background: #0f1117; border: 1px solid #2d3148; border-radius: 5px;
  color: #e2e8f0; padding: 4px 7px; font-size: 12px;
}
.filter-row input:focus, .filter-row select:focus { outline: none; border-color: #6366f1; }
.filter-row select option { background: #1a1d27; }

.session-list { flex: 1; overflow-y: auto; }
.session-list::-webkit-scrollbar { width: 4px; }
.session-list::-webkit-scrollbar-thumb { background: #2d3148; border-radius: 2px; }

.section-hdr {
  padding: 5px 10px 3px;
  font-size: 10px; color: #475569; text-transform: uppercase; letter-spacing: .5px; font-weight: 600;
  background: #0f1117; position: sticky; top: 0; z-index: 1;
}

.s-item {
  padding: 9px 10px;
  border-bottom: 1px solid #161820;
  cursor: pointer;
}
.s-item:hover  { background: #1a1d27; }
.s-item.active { background: #1e2235; border-left: 2px solid #6366f1; padding-left: 8px; }
.s-name { font-size: 13px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.s-meta { font-size: 11px; color: #475569; margin-top: 2px; display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
.tag {
  display: inline-block; padding: 1px 5px; border-radius: 3px;
  font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .3px;
}
.tag-recording { background: #1e3a5f; color: #60a5fa; }
.tag-legacy    { background: #1f2937; color: #9ca3af; }
.tag-session   { background: #1a2d3f; color: #38bdf8; }
.tag-highlight { background: #2d1a4a; color: #c084fc; }
.tag-upload    { background: #1a2e1a; color: #4ade80; }

.load-more-row { flex-shrink: 0; padding: 8px; text-align: center; border-top: 1px solid #2d3148; }
.empty { padding: 32px 16px; text-align: center; color: #475569; font-size: 13px; }

/* ── main panel ── */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.main-placeholder {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #374151;
  font-size: 13px;
}

.detail-header {
  flex-shrink: 0;
  padding: 10px 14px;
  background: #1a1d27;
  border-bottom: 1px solid #2d3148;
  display: flex;
  align-items: flex-start;
  gap: 10px;
}
.detail-title { font-size: 14px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.detail-sub   { font-size: 11px; color: #64748b; margin-top: 3px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
.detail-actions { flex-shrink: 0; display: flex; gap: 5px; }

.tabs {
  flex-shrink: 0;
  display: flex;
  border-bottom: 1px solid #2d3148;
  background: #161820;
  padding: 0 14px;
}
.tab {
  padding: 7px 12px; font-size: 12px; color: #64748b; cursor: pointer;
  border-bottom: 2px solid transparent; user-select: none;
}
.tab:hover { color: #94a3b8; }
.tab.active { color: #a5b4fc; border-bottom-color: #6366f1; }

.tab-body { flex: 1; overflow-y: auto; padding: 14px; }
.tab-body::-webkit-scrollbar { width: 4px; }
.tab-body::-webkit-scrollbar-thumb { background: #2d3148; border-radius: 2px; }
.tab-body.is-map { padding: 0; overflow: hidden; }

/* ── info cards ── */
.info-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 8px; margin-bottom: 14px; }
.card { background: #1a1d27; border: 1px solid #2d3148; border-radius: 7px; padding: 10px 12px; }
.card-label { font-size: 10px; color: #64748b; text-transform: uppercase; letter-spacing: .5px; }
.card-value { font-size: 13px; color: #e2e8f0; margin-top: 3px; font-weight: 500; word-break: break-all; }
.chips { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; }
.chip { background: #1e2235; border: 1px solid #2d3148; border-radius: 20px; padding: 2px 9px; font-size: 11px; color: #94a3b8; }

/* ── telemetry controls ── */
.tel-controls {
  background: #1a1d27; border: 1px solid #2d3148; border-radius: 7px;
  padding: 10px 12px; margin-bottom: 10px;
  display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap;
}
.ctrl { display: flex; flex-direction: column; gap: 3px; }
.ctrl label { font-size: 10px; color: #64748b; }
.ctrl input, .ctrl select {
  background: #0f1117; border: 1px solid #2d3148; border-radius: 4px;
  color: #e2e8f0; padding: 4px 7px; font-size: 12px;
}
.ctrl input:focus, .ctrl select:focus { outline: none; border-color: #6366f1; }
.field-checks { display: flex; flex-wrap: wrap; gap: 4px; }
.fchk { display: flex; align-items: center; gap: 3px; font-size: 11px; color: #94a3b8; cursor: pointer; }
.fchk input { accent-color: #6366f1; }

/* ── table ── */
.tbl-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 11.5px; }
thead th {
  background: #1a1d27; color: #64748b; font-weight: 600; text-align: left;
  padding: 6px 9px; border-bottom: 1px solid #2d3148; white-space: nowrap;
  position: sticky; top: 0; z-index: 1;
}
tbody tr:hover { background: #1a1d27; }
tbody td { padding: 4px 9px; border-bottom: 1px solid #161820; color: #cbd5e1; white-space: nowrap; font-family: monospace; }

.meta-bar {
  display: flex; gap: 10px; flex-wrap: wrap;
  padding: 6px 9px; background: #1a1d27; border: 1px solid #2d3148; border-radius: 5px;
  margin-bottom: 8px; font-size: 11px; color: #64748b;
}
.meta-bar b { color: #94a3b8; }

/* ── buttons ── */
button {
  background: #6366f1; color: #fff; border: none; border-radius: 5px;
  padding: 5px 12px; font-size: 12px; cursor: pointer; font-weight: 500; white-space: nowrap;
}
button:hover { background: #4f46e5; }
button:disabled { background: #374151; color: #6b7280; cursor: not-allowed; }
button.sec { background: #1e2235; color: #94a3b8; border: 1px solid #2d3148; }
button.sec:hover { background: #2d3148; color: #e2e8f0; }

/* ── spinner ── */
.spin {
  display: inline-block; width: 12px; height: 12px;
  border: 2px solid #2d3148; border-top-color: #6366f1;
  border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <h1>TrollSports Data Browser</h1>
  <div class="cfg">
    <label>API URL</label>
    <input id="apiUrl" type="url" placeholder="https://trollsports-live.pages.dev">
  </div>
  <div class="cfg">
    <label>Key</label>
    <input id="apiKey" type="password" placeholder="api key">
  </div>
  <button onclick="connect()">Connect</button>
</header>

<div id="statusBanner">Ready — enter API URL and key, then click Connect.</div>

<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="filters">
      <div class="filter-row">
        <input id="fAthlete" type="text" placeholder="Filter athlete…" oninput="debounce()">
        <select id="fType" onchange="fetchSessions()">
          <option value="">All types</option>
          <option value="recording">Recording</option>
          <option value="highlight">Highlight</option>
          <option value="upload">Upload</option>
          <option value="legacy">Daily Session</option>
        </select>
      </div>
      <div class="filter-row">
        <input id="fFrom" type="date" title="From date" onchange="fetchSessions()">
        <input id="fTo"   type="date" title="To date"   onchange="fetchSessions()">
      </div>
    </div>
    <div id="sessionList" class="session-list">
      <div class="empty">No data loaded yet.</div>
    </div>
    <div id="loadMoreRow" class="load-more-row" style="display:none">
      <button class="sec" onclick="fetchMore()">Load more</button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main" id="main">
    <div class="main-placeholder">Select a session from the list.</div>
  </div>

</div>

<script>
// ── PERSIST CONFIG ────────────────────────────────────────────────────────────
(function () {
  try {
    const s = JSON.parse(localStorage.getItem('tsb') || '{}');
    if (s.url) document.getElementById('apiUrl').value = s.url;
    if (s.key) document.getElementById('apiKey').value = s.key;
  } catch (_) {}
})();

function saveConfig() {
  try {
    localStorage.setItem('tsb', JSON.stringify({
      url: document.getElementById('apiUrl').value.trim().replace(/\/$/, ''),
      key: document.getElementById('apiKey').value.trim(),
    }));
  } catch (_) {}
}

// ── STATUS ────────────────────────────────────────────────────────────────────
function status(msg, state) {
  // state: '' | 'ok' | 'err'
  const el = document.getElementById('statusBanner');
  el.className = state === 'err' ? 'err' : state === 'ok' ? 'ok' : '';
  el.innerHTML = state === 'err' ? `&#x2715; ${esc(msg)}`
               : state === 'ok'  ? `&#x2713; ${esc(msg)}`
               :                   `<span class="spin"></span> ${esc(msg)}`;
}

// ── API ───────────────────────────────────────────────────────────────────────
function base() { return document.getElementById('apiUrl').value.trim().replace(/\/$/, ''); }
function key()  { return document.getElementById('apiKey').value.trim(); }

async function api(path) {
  const b = base(), k = key();
  if (!b) throw new Error('Enter the API URL (e.g. https://trollsports-live.pages.dev)');
  if (!k) throw new Error('Enter the API key');
  if (!b.match(/^https?:\/\//)) throw new Error('API URL must start with https://');
  const sep = path.includes('?') ? '&' : '?';
  const url = `${b}${path}${sep}api_key=${encodeURIComponent(k)}`;
  let res;
  try { res = await fetch(url); } catch (e) { throw new Error(`Network error: ${e.message}`); }
  let json;
  try { json = await res.json(); } catch (_) { throw new Error(`Server returned ${res.status} (not JSON — check the API URL)`); }
  if (!json.success) throw new Error(json.message || json.error || `API error ${res.status}`);
  return json;
}

// ── SESSION LIST ──────────────────────────────────────────────────────────────
let recOffset = 0, recHasMore = false;
let activeId = null, debTimer = null;

function debounce() { clearTimeout(debTimer); debTimer = setTimeout(fetchSessions, 350); }

async function connect() { saveConfig(); fetchSessions(); }
async function fetchMore() { fetchSessions(false); }

// Fetch /api/backup (internal, no auth required) — same source as the main tsp live backup menu
async function backupFetch() {
  const b = base();
  if (!b) throw new Error('Enter the API URL (e.g. https://trollsports-live.pages.dev)');
  if (!b.match(/^https?:\/\//)) throw new Error('API URL must start with https://');
  let res;
  try { res = await fetch(`${b}/api/backup`); } catch (e) { throw new Error(`Network error: ${e.message}`); }
  let json;
  try { json = await res.json(); } catch (_) { throw new Error(`Server returned ${res.status}`); }
  return json;
}

// Convert /api/backup session row to the normalized format makeSessionItem expects
function normalizeBackupSession(s) {
  function parseList(v) {
    if (!v) return [];
    try { const p = JSON.parse(v); return Array.isArray(p) ? p : []; } catch {}
    return v.split(',').map(x => x.trim()).filter(Boolean);
  }
  function parseObj(v) {
    if (!v) return {};
    try { const p = JSON.parse(v); return (p && typeof p === 'object' && !Array.isArray(p)) ? p : {}; } catch {}
    return {};
  }
  return {
    id:            s.session_id,
    display_name:  s.custom_filename || s.session_id,
    type:          'legacy',
    source:        s.source || null,
    start_time:    s.start_time,
    end_time:      s.end_time || null,
    duration_ms:   s.end_time ? s.end_time - s.start_time : null,
    unit_ids:      parseList(s.unit_ids),
    athlete_names: parseObj(s.athlete_names),
    location:      s.location || null,
    metadata:      null,
  };
}

function buildQS(type, limit, offset) {
  const athlete = document.getElementById('fAthlete').value.trim();
  const fromD   = document.getElementById('fFrom').value;
  const toD     = document.getElementById('fTo').value;
  let qs = `?limit=${limit}&offset=${offset}`;
  if (type)    qs += `&type=${encodeURIComponent(type)}`;
  if (athlete) qs += `&athlete=${encodeURIComponent(athlete)}`;
  if (fromD)   qs += `&from=${new Date(fromD).getTime()}`;
  if (toD)     qs += `&to=${new Date(toD + 'T23:59:59').getTime()}`;
  return qs;
}

async function fetchSessions(reset = true) {
  if (reset) { recOffset = 0; }
  status('Loading sessions…');

  const typeFilter     = document.getElementById('fType').value;
  const wantSessions   = !typeFilter || typeFilter === 'legacy';
  const wantRecordings = !typeFilter || typeFilter !== 'legacy';
  const recTypeParam   = (typeFilter && typeFilter !== 'legacy') ? typeFilter : '';

  // Client-side filters applied to Full Sessions (backup API has no server-side filtering)
  const athleteFilter = document.getElementById('fAthlete').value.trim().toLowerCase();
  const fromD  = document.getElementById('fFrom').value;
  const toD    = document.getElementById('fTo').value;
  const fromMs = fromD ? new Date(fromD).getTime() : null;
  const toMs   = toD   ? new Date(toD + 'T23:59:59').getTime() : null;

  try {
    const list = document.getElementById('sessionList');
    if (reset) list.innerHTML = '';
    let anyShown = false;

    // ── Full Sessions via /api/backup (same as main tsp live page) ─────────────
    if (wantSessions && reset) {
      const backup = await backupFetch();
      let contSessions = (backup.sessions || [])
        .filter(s => /^cont-\d{4}-\d{2}-\d{2}$/.test(s.session_id));

      if (fromMs !== null) contSessions = contSessions.filter(s => s.start_time >= fromMs);
      if (toMs   !== null) contSessions = contSessions.filter(s => s.start_time <= toMs);
      if (athleteFilter)   contSessions = contSessions.filter(s =>
        (s.athlete_names || '').toLowerCase().includes(athleteFilter));

      const items = contSessions.map(normalizeBackupSession);
      if (items.length) {
        anyShown = true;
        const hdr = document.createElement('div');
        hdr.className = 'section-hdr';
        hdr.textContent = 'Full Sessions';
        list.appendChild(hdr);
        items.forEach(s => list.appendChild(makeSessionItem(s)));
      }
    }

    // ── Recordings via /api/data/sessions (public API, auth required) ──────────
    if (wantRecordings) {
      const { data, meta } = await api(`/api/data/sessions${buildQS(recTypeParam, 100, recOffset)}`);
      const items = (!typeFilter) ? data.filter(s => s.type !== 'legacy') : data;
      recHasMore = meta.has_more;
      recOffset += data.length;

      if (items.length) {
        anyShown = true;
        if (reset) {
          const hdr = document.createElement('div');
          hdr.className = 'section-hdr';
          hdr.textContent = 'Recordings';
          list.appendChild(hdr);
        }
        items.forEach(s => list.appendChild(makeSessionItem(s)));
      }
    }

    if (!anyShown && reset) list.innerHTML = '<div class="empty">No sessions found.</div>';
    document.getElementById('loadMoreRow').style.display = recHasMore ? 'block' : 'none';
    const count = list.querySelectorAll('.s-item').length;
    status(`${count} item${count !== 1 ? 's' : ''} loaded`, 'ok');
  } catch (e) {
    document.getElementById('sessionList').innerHTML = `<div class="empty" style="color:#f87171">${esc(e.message)}</div>`;
    status(e.message, 'err');
  }
}

// Format cont-YYYY-MM-DD session IDs to "Full Session April 16, 2026"
function contSessionLabel(id) {
  const m = id.match(/^cont-(\d{4})-(\d{2})-(\d{2})$/);
  if (!m) return id;
  return 'Full Session ' + new Date(`${m[1]}-${m[2]}-${m[3]}T12:00:00`).toLocaleDateString(undefined, { day: 'numeric', month: 'long', year: 'numeric' });
}

// Duration display that handles cont sessions whose end_time was never written
// or was set prematurely by a Durable Object restart mid-day.
// For past cont sessions: trust end_time only if it's >= 1h; otherwise estimate to midnight UTC.
function sessionDur(s) {
  const m = (s.id || '').match(/^cont-(\d{4})-(\d{2})-(\d{2})$/);
  if (m) {
    const today    = new Date().toISOString().slice(0, 10);
    const sessDate = `${m[1]}-${m[2]}-${m[3]}`;
    if (sessDate === today && !s.end_time) return '<span style="color:#f59e0b">Live</span>';
    // For past days: use end_time only when it looks plausible (>= 1 hour from start)
    if (s.end_time && (s.end_time - s.start_time) >= 3_600_000) return fmtDur(s.end_time - s.start_time);
    // Otherwise estimate: start_time → midnight UTC of that day
    const midnight = Date.UTC(+m[1], +m[2] - 1, +m[3] + 1);
    const approx   = midnight - s.start_time;
    return approx > 0 ? `~${fmtDur(approx)}` : '<span style="color:#64748b">Completed</span>';
  }
  if (s.end_time) return fmtDur(s.end_time - s.start_time);
  return '<span style="color:#f59e0b">Live</span>';
}

function makeSessionItem(s) {
  const el = document.createElement('div');
  el.className = 's-item' + (s.id === activeId ? ' active' : '');
  el.dataset.id = s.id;
  const dur = sessionDur(s);
  const who = Object.values(s.athlete_names || {}).filter(Boolean).join(', ') || (s.unit_ids || []).join(', ') || '';
  const isDaily  = s.type === 'legacy' && /^cont-/.test(s.id);
  const tagClass = isDaily ? 'tag-session' : `tag-${esc(s.type)}`;
  const tagLabel = isDaily ? 'Daily' : s.type;
  const name     = isDaily ? contSessionLabel(s.id) : s.display_name;
  el.innerHTML = `
    <div class="s-name">${esc(name)}</div>
    <div class="s-meta">
      <span class="tag ${esc(tagClass)}">${esc(tagLabel)}</span>
      <span>${fmtDate(s.start_time)}</span>
      <span>${dur}</span>
      ${who ? `<span style="color:#374151">${esc(who)}</span>` : ''}
    </div>`;
  el.onclick = () => openSession(s.id);
  return el;
}

// ── SESSION DETAIL ────────────────────────────────────────────────────────────
let current = null, currentTab = 'info';

async function openSession(id) {
  activeId = id;
  document.querySelectorAll('.s-item').forEach(el => el.classList.toggle('active', el.dataset.id === id));
  status('Loading session…');
  try {
    const { data } = await api(`/api/data/sessions/${encodeURIComponent(id)}`);
    current = data;
    renderPanel(data);
    status(`Loaded: ${data.display_name}`, 'ok');
  } catch (e) { status(e.message, 'err'); }
}

function renderPanel(s) {
  const isDaily    = s.type === 'legacy' && /^cont-/.test(s.id);
  const title      = isDaily ? contSessionLabel(s.id) : s.display_name;
  const tagClass   = isDaily ? 'tag-session' : `tag-${esc(s.type)}`;
  const tagLabel   = isDaily ? 'Daily' : s.type;
  const durDisplay = isDaily ? sessionDur(s) : fmtDur(s.duration_ms);
  document.getElementById('main').innerHTML = `
    <div class="detail-header">
      <div style="flex:1;min-width:0">
        <div class="detail-title">${esc(title)}</div>
        <div class="detail-sub">
          <span class="tag ${esc(tagClass)}">${esc(tagLabel)}</span>
          <span>${fmtDateFull(s.start_time)}</span>
          <span>${durDisplay}</span>
          ${s.location ? `<span>&#x1f4cd; ${esc(s.location)}</span>` : ''}
        </div>
      </div>
      <div class="detail-actions">
        <button class="sec" onclick="copyId()">Copy ID</button>
        <button onclick="exportJSON()">Export JSON</button>
      </div>
    </div>
    <div class="tabs">
      ${['info','telemetry','marks','wind','map'].map(t =>
        `<div class="tab${t===currentTab?' active':''}" onclick="switchTab('${t}')">${t[0].toUpperCase()+t.slice(1)}</div>`
      ).join('')}
    </div>
    <div class="tab-body" id="tabBody"></div>
  `;
  switchTab(currentTab);
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(el => el.classList.toggle('active', el.textContent.toLowerCase() === tab));
  const body = document.getElementById('tabBody');
  if (!body) return;
  body.className = tab === 'map' ? 'tab-body is-map' : 'tab-body';
  if (tab === 'info')      renderInfo(body);
  if (tab === 'telemetry') renderTelControls(body);
  if (tab === 'marks')     loadMarks(body);
  if (tab === 'wind')      loadWind(body);
  if (tab === 'map')       loadMap(body);
}

// ── INFO ──────────────────────────────────────────────────────────────────────
function renderInfo(el) {
  const s = current;
  const isDaily  = s.type === 'legacy' && /^cont-/.test(s.id);
  const athletes = Object.entries(s.athlete_names || {});
  const units = s.unit_ids || [];
  const endDisplay = s.end_time ? fmtDateFull(s.end_time) : (isDaily ? '<span style="color:#64748b">Not recorded</span>' : '<span style="color:#f59e0b">Ongoing</span>');
  el.innerHTML = `
    <div class="info-grid">
      ${card('Session ID', `<span style="font-family:monospace;font-size:11px">${esc(s.id)}</span>`)}
      ${card('Type', `<span class="tag tag-${esc(s.type)}">${esc(s.type)}</span>`)}
      ${card('Start', fmtDateFull(s.start_time))}
      ${card('End', endDisplay)}
      ${card('Duration', sessionDur(s))}
      ${card('Location', s.location ? esc(s.location) : '—')}
      ${card('Source', s.source ? esc(s.source) : '—')}
      ${card('Marks / Wind', `${s.summary.marks} / ${s.summary.wind_samples}`)}
    </div>
    ${athletes.length > 0 ? `
      <div style="color:#64748b;font-size:10px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Athletes</div>
      <div class="chips">${athletes.map(([uid, name]) =>
        `<div class="chip">${esc(name)} <span style="color:#475569;font-family:monospace">${esc(uid)}</span></div>`
      ).join('')}</div>` : units.length > 0 ? `
      <div style="color:#64748b;font-size:10px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Units</div>
      <div class="chips">${units.map(u => `<div class="chip" style="font-family:monospace">${esc(u)}</div>`).join('')}</div>
    ` : ''}
  `;
}

function card(label, value) {
  return `<div class="card"><div class="card-label">${label}</div><div class="card-value">${value}</div></div>`;
}

// ── TELEMETRY ─────────────────────────────────────────────────────────────────
const DEF_FIELDS = ['timestamp','unit_id','lat','lon','sog','cog','roll','pitch'];
const ALL_FIELDS = ['timestamp','unit_id','custom_name','lat','lon','alt','roll','pitch','yaw',
  'sog','cog','hdop','gnss_ms','gnss_iso','mag_x','mag_y','mag_z','rudder_angle','boom_angle','torso_angle','seq'];

function renderTelControls(el) {
  const units = current.unit_ids || [];
  el.innerHTML = `
    <div class="tel-controls">
      <div class="ctrl">
        <label>Max points/unit</label>
        <input id="ctrlPts" type="number" value="500" min="50" max="5000" style="width:72px">
      </div>
      <div class="ctrl">
        <label>Unit</label>
        <select id="ctrlUnit">
          <option value="">All</option>
          ${units.map(u => `<option value="${esc(u)}">${esc(u)}</option>`).join('')}
        </select>
      </div>
      <div class="ctrl" style="flex:1">
        <label>Fields</label>
        <div class="field-checks">
          ${ALL_FIELDS.map(f => `
            <label class="fchk">
              <input type="checkbox" value="${f}" ${DEF_FIELDS.includes(f)?'checked':''}>
              ${f}
            </label>`).join('')}
        </div>
      </div>
      <div class="ctrl"><label>&nbsp;</label><button onclick="loadTelemetry()">Load</button></div>
    </div>
    <div id="telResult"><div class="empty">Click Load to fetch telemetry.</div></div>
  `;
}

async function loadTelemetry() {
  const pts    = parseInt(document.getElementById('ctrlPts').value, 10) || 500;
  const unit   = document.getElementById('ctrlUnit').value;
  const fields = [...document.querySelectorAll('.fchk input:checked')].map(e => e.value);
  if (!fields.length) { alert('Select at least one field.'); return; }

  const el = document.getElementById('telResult');
  el.innerHTML = '<div class="empty"><span class="spin"></span> Loading…</div>';
  status('Loading telemetry…');

  let qs = `?max_points=${pts}&fields=${fields.join(',')}`;
  if (unit) qs += `&units=${encodeURIComponent(unit)}`;

  try {
    const { data, meta } = await api(`/api/data/sessions/${encodeURIComponent(current.id)}/telemetry${qs}`);
    renderTable(el, data, meta, fields);
    status(`${meta.count} rows${meta.downsampled ? ` (${meta.bucket_ms}ms buckets)` : ''}`, 'ok');
  } catch (e) {
    el.innerHTML = `<div class="empty" style="color:#f87171">${esc(e.message)}</div>`;
    status(e.message, 'err');
  }
}

function renderTable(container, data, meta, fields) {
  if (!data.length) { container.innerHTML = '<div class="empty">No telemetry data in this range.</div>'; return; }
  const rows = data.slice(0, 2000);
  container.innerHTML = `
    <div class="meta-bar">
      <span><b>${meta.count}</b> rows</span>
      ${meta.downsampled ? `<span><b>Downsampled</b> · ${meta.bucket_ms}ms buckets</span>` : '<span>Raw</span>'}
      <span>${fmtDateFull(meta.from)} → ${fmtDateFull(meta.to)}</span>
      <span>Units: <b>${Array.isArray(meta.units) ? meta.units.join(', ') : meta.units}</b></span>
    </div>
    <div class="tbl-wrap">
      <table>
        <thead><tr>${fields.map(f => `<th>${f}</th>`).join('')}</tr></thead>
        <tbody>${rows.map(r => `<tr>${fields.map(f => `<td>${fmtCell(r[f], f)}</td>`).join('')}</tr>`).join('')}</tbody>
      </table>
    </div>
    ${data.length > 2000 ? `<div style="padding:6px;color:#64748b;font-size:11px;text-align:center">Showing 2000 of ${data.length} rows</div>` : ''}
  `;
}

function fmtCell(v, col) {
  if (v == null) return '<span style="color:#374151">—</span>';
  if (col === 'timestamp' || col === 'gnss_ms')
    return `<span style="color:#64748b">${new Date(v).toISOString().replace('T',' ').slice(0,23)}</span>`;
  if (typeof v === 'number') {
    if (['lat','lon'].includes(col)) return v.toFixed(6);
    if (['roll','pitch','yaw','cog','rudder_angle','boom_angle','torso_angle'].includes(col)) return v.toFixed(2)+'°';
    if (col === 'sog') return v.toFixed(3)+' m/s';
    return Number.isInteger(v) ? v : v.toFixed(4);
  }
  return esc(String(v));
}

// ── MARKS ─────────────────────────────────────────────────────────────────────
async function loadMarks(el) {
  el.innerHTML = '<div class="empty"><span class="spin"></span> Loading…</div>';
  status('Loading marks…');
  try {
    const { data } = await api(`/api/data/sessions/${encodeURIComponent(current.id)}/marks`);
    if (!data.length) { el.innerHTML = '<div class="empty">No marks for this session.</div>'; status('No marks', 'ok'); return; }
    el.innerHTML = `<div class="tbl-wrap"><table>
      <thead><tr><th>Type</th><th>Lat</th><th>Lon</th><th>Time</th></tr></thead>
      <tbody>${data.map(m => `<tr>
        <td><span class="tag" style="background:#1a2e35;color:#67e8f9">${esc(m.mark_type)}</span></td>
        <td>${m.lat.toFixed(6)}</td><td>${m.lon.toFixed(6)}</td>
        <td style="color:#64748b">${new Date(m.timestamp).toISOString().replace('T',' ').slice(0,23)}</td>
      </tr>`).join('')}</tbody>
    </table></div>`;
    status(`${data.length} marks`, 'ok');
  } catch (e) { el.innerHTML = `<div class="empty" style="color:#f87171">${esc(e.message)}</div>`; status(e.message, 'err'); }
}

// ── WIND ──────────────────────────────────────────────────────────────────────
async function loadWind(el) {
  el.innerHTML = '<div class="empty"><span class="spin"></span> Loading…</div>';
  status('Loading wind…');
  try {
    const { data } = await api(`/api/data/sessions/${encodeURIComponent(current.id)}/wind`);
    if (!data.length) { el.innerHTML = '<div class="empty">No wind data for this session.</div>'; status('No wind data', 'ok'); return; }
    el.innerHTML = `<div class="tbl-wrap"><table>
      <thead><tr><th>Time</th><th>Direction</th><th>Speed (kt)</th><th>Source</th></tr></thead>
      <tbody>${data.map(w => `<tr>
        <td style="color:#64748b">${new Date(w.timestamp).toISOString().replace('T',' ').slice(0,23)}</td>
        <td>${w.wind_direction != null ? w.wind_direction.toFixed(1)+'°' : '—'}</td>
        <td>${w.wind_speed_kt  != null ? w.wind_speed_kt.toFixed(1)+' kt' : '—'}</td>
        <td style="color:#64748b">${esc(w.source||'—')}</td>
      </tr>`).join('')}</tbody>
    </table></div>`;
    status(`${data.length} wind samples`, 'ok');
  } catch (e) { el.innerHTML = `<div class="empty" style="color:#f87171">${esc(e.message)}</div>`; status(e.message, 'err'); }
}

// ── MAP ───────────────────────────────────────────────────────────────────────
const TRACK_COLORS = ['#60a5fa','#f87171','#4ade80','#fbbf24','#c084fc','#34d399','#fb923c','#a78bfa'];
let leafletMap = null;

async function loadMap(el) {
  // Destroy previous map instance so Leaflet doesn't complain about re-use
  if (leafletMap) { leafletMap.remove(); leafletMap = null; }
  el.innerHTML = '<div id="lmap" style="width:100%;height:100%"></div>';
  status('Loading map data…');

  try {
    const [telRes, marksRes] = await Promise.all([
      api(`/api/data/sessions/${encodeURIComponent(current.id)}/telemetry?fields=timestamp,unit_id,lat,lon,sog,cog&max_points=1000`),
      api(`/api/data/sessions/${encodeURIComponent(current.id)}/marks`),
    ]);

    const pts = telRes.data.filter(r => r.lat != null && r.lon != null);
    if (!pts.length) {
      el.innerHTML = '<div class="empty">No GPS data for this session.</div>';
      el.className = 'tab-body';
      status('No GPS data', 'ok');
      return;
    }

    leafletMap = L.map('lmap');
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
      maxZoom: 19,
    }).addTo(leafletMap);

    // Group by unit_id, preserving insertion order (sorted by timestamp)
    const tracks = {};
    for (const r of pts) {
      if (!tracks[r.unit_id]) tracks[r.unit_id] = [];
      tracks[r.unit_id].push(r);
    }

    const allLatLng = [];
    const unitIds = Object.keys(tracks);

    unitIds.forEach((uid, i) => {
      const color   = TRACK_COLORS[i % TRACK_COLORS.length];
      const latLngs = tracks[uid].map(r => [r.lat, r.lon]);
      allLatLng.push(...latLngs);

      // Track line
      L.polyline(latLngs, { color, weight: 3, opacity: 0.85 }).addTo(leafletMap);

      // Start dot
      L.circleMarker(latLngs[0], { radius: 6, color: '#fff', weight: 2, fillColor: color, fillOpacity: 1 })
        .bindTooltip(`${uid} — start`, { permanent: false })
        .addTo(leafletMap);

      // End dot
      L.circleMarker(latLngs[latLngs.length - 1], { radius: 5, color: '#fff', weight: 2, fillColor: color, fillOpacity: 0.6 })
        .bindTooltip(`${uid} — end`)
        .addTo(leafletMap);
    });

    // Legend (top-right)
    if (unitIds.length > 1) {
      const legend = L.control({ position: 'topright' });
      legend.onAdd = () => {
        const div = L.DomUtil.create('div');
        div.style.cssText = 'background:#1a1d27;border:1px solid #2d3148;border-radius:6px;padding:8px 10px;font:12px system-ui;color:#e2e8f0;line-height:1.7';
        div.innerHTML = unitIds.map((uid, i) => {
          const athleteName = current.athlete_names?.[uid] || uid;
          return `<div><span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:${TRACK_COLORS[i % TRACK_COLORS.length]};margin-right:6px;vertical-align:middle"></span>${esc(athleteName)}</div>`;
        }).join('');
        return div;
      };
      legend.addTo(leafletMap);
    }

    // Course marks
    const markStyle = {
      top_mark:     { color: '#ef4444', label: 'Top Mark' },
      start_line_a: { color: '#22c55e', label: 'Start A'  },
      start_line_b: { color: '#22c55e', label: 'Start B'  },
    };
    const startA = marksRes.data.find(m => m.mark_type === 'start_line_a');
    const startB = marksRes.data.find(m => m.mark_type === 'start_line_b');
    if (startA && startB) {
      L.polyline([[startA.lat, startA.lon], [startB.lat, startB.lon]],
        { color: '#22c55e', weight: 2, dashArray: '6 4', opacity: 0.8 }).addTo(leafletMap);
    }
    for (const mark of marksRes.data) {
      const style = markStyle[mark.mark_type] || { color: '#f59e0b', label: mark.mark_type };
      allLatLng.push([mark.lat, mark.lon]);
      L.circleMarker([mark.lat, mark.lon], {
        radius: 8, color: '#fff', weight: 2, fillColor: style.color, fillOpacity: 0.9,
      }).bindTooltip(style.label, { permanent: true, direction: 'top', offset: [0, -10],
        className: 'leaflet-mark-tooltip' }).addTo(leafletMap);
    }

    leafletMap.fitBounds(allLatLng, { padding: [32, 32] });
    status(`${pts.length} GPS points across ${unitIds.length} unit${unitIds.length !== 1 ? 's' : ''}`, 'ok');
  } catch (e) {
    el.innerHTML = `<div class="empty" style="color:#f87171">${esc(e.message)}</div>`;
    el.className = 'tab-body';
    status(e.message, 'err');
  }
}

// ── EXPORT ────────────────────────────────────────────────────────────────────
async function exportJSON() {
  status('Exporting…');
  try {
    const [tel, marks, wind] = await Promise.all([
      api(`/api/data/sessions/${encodeURIComponent(current.id)}/telemetry?max_points=5000`),
      api(`/api/data/sessions/${encodeURIComponent(current.id)}/marks`),
      api(`/api/data/sessions/${encodeURIComponent(current.id)}/wind`),
    ]);
    const blob = new Blob([JSON.stringify({ session: current, telemetry: tel.data, marks: marks.data, wind: wind.data }, null, 2)], { type: 'application/json' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `${current.id}.json`; a.click();
    status(`Saved ${current.id}.json`, 'ok');
  } catch (e) { status(e.message, 'err'); }
}

function copyId() {
  navigator.clipboard.writeText(current.id).catch(() => {});
  status(`Copied: ${current.id}`, 'ok');
}

// ── UTILS ─────────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtDate(ms) {
  return ms ? new Date(ms).toLocaleDateString(undefined, { month:'short', day:'numeric', year:'numeric' }) : '—';
}
function fmtDateFull(ms) {
  return ms ? new Date(ms).toISOString().replace('T',' ').slice(0,19)+' UTC' : '—';
}
function fmtDur(ms) {
  if (!ms || ms < 0) return '—';
  const h = Math.floor(ms/3600000), m = Math.floor((ms%3600000)/60000), s = Math.floor((ms%60000)/1000);
  return h ? `${h}h ${m}m` : m ? `${m}m ${s}s` : `${s}s`;
}
